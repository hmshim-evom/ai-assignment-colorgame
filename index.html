<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Guess the Evom Color</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --bg:#08080A;
    --stage:#0D0D10;
    --ink:#FFFFFF;
    --muted:#8A8A90;
    --faint:#5A5A62;
    --accent:#5E1AFF;
    --accent-2:#7566FF;
    --hair:rgba(255,255,255,.12);
    --r-stage:30px; --r-pill:9999px;
    --font:'Pretendard','Pretendard Variable',-apple-system,'Apple SD Gothic Neo','Noto Sans KR',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:var(--font);background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;
    padding:clamp(14px,4vw,40px);min-height:100%;
  }
  .stage{
    position:relative;width:100%;max-width:440px;aspect-ratio:4/5;
    border-radius:var(--r-stage);overflow:hidden;background:var(--stage);
    box-shadow:0 30px 80px rgba(0,0,0,.55);
    isolation:isolate;
  }
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;}
  .hidden{display:none !important;}
  .pad{padding:clamp(22px,6%,32px);}

  /* shared overlays */
  .rtag{position:absolute;top:22px;left:24px;font-size:14px;font-weight:600;letter-spacing:.06em;font-variant-numeric:tabular-nums;z-index:5;}
  .wmark{position:absolute;top:22px;right:24px;font-size:13px;font-weight:600;letter-spacing:.02em;opacity:.55;z-index:5;}

  /* round action button (white circle, dark glyph) */
  .fab{
    position:absolute;bottom:22px;right:22px;width:58px;height:58px;border-radius:50%;
    background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 24px rgba(0,0,0,.35);transition:transform .12s ease;z-index:6;
  }
  .fab:hover{transform:translateY(-2px);}
  .fab:active{transform:translateY(0);}
  .fab svg{width:24px;height:24px;stroke:#0b0b0d;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .fab:focus-visible{outline:3px solid var(--accent-2);outline-offset:3px;}

  /* big display type */
  .huge{font-size:clamp(64px,20vw,104px);font-weight:800;line-height:.92;letter-spacing:-.03em;}
  .big-num{font-size:clamp(56px,17vw,92px);font-weight:800;line-height:.9;letter-spacing:-.03em;font-variant-numeric:tabular-nums;}

  /* buttons / inputs */
  .btn{font-family:var(--font);font-weight:700;font-size:15px;border:none;border-radius:var(--r-pill);cursor:pointer;
    padding:14px 22px;transition:transform .12s ease,background .2s,opacity .2s;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{transform:translateY(-1px);background:#5414e6;}
  .btn-primary:disabled{background:#26262b;color:#666;cursor:not-allowed;transform:none;}
  .btn-outline{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.65);}
  .btn-outline:hover{background:rgba(255,255,255,.08);}
  .btn-text{background:transparent;color:var(--muted);font-weight:600;font-size:13.5px;padding:8px;cursor:pointer;border:none;}
  .btn-text:hover{color:#fff;}
  .btn:focus-visible{outline:3px solid var(--accent-2);outline-offset:2px;}
  input[type=text]{
    font-family:var(--font);font-size:16px;font-weight:600;color:#fff;background:transparent;
    border:1.5px solid rgba(255,255,255,.3);border-radius:var(--r-pill);padding:14px 20px;outline:none;width:100%;
    transition:border-color .15s;
  }
  input[type=text]::placeholder{color:#6a6a72;}
  input[type=text]:focus{border-color:var(--accent-2);}

  /* START */
  #screen-start{justify-content:flex-start;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-2);}
  .desc{margin-top:14px;color:var(--muted);font-size:15px;line-height:1.6;max-width:32ch;}
  .start-foot{margin-top:auto;display:flex;gap:12px;align-items:stretch;}
  .start-foot input{flex:1.1;}
  .start-foot .btn-primary{flex:1;white-space:nowrap;}

  /* COUNT-IN */
  #screen-countin{align-items:flex-end;justify-content:flex-start;background:#000;}
  #countinWord{margin:0 24px;padding-top:8%;text-align:right;}
  #countinWord .huge{transition:opacity .18s ease, transform .18s ease;}

  /* REVEAL */
  #revealNum{position:absolute;top:18px;right:24px;text-align:right;z-index:5;}
  #revealNum .big-num{display:block;}
  #revealNum .sub{font-size:13px;font-weight:600;opacity:.8;margin-top:2px;}

  /* GUESS */
  #screen-guess{}
  .rail{position:absolute;left:16px;top:58px;bottom:22px;display:flex;gap:9px;z-index:4;}
  .vbar{position:relative;width:30px;height:100%;border-radius:16px;cursor:pointer;touch-action:none;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.15);}
  .vhandle{position:absolute;left:50%;width:24px;height:24px;border-radius:50%;background:#fff;
    transform:translate(-50%,-50%);box-shadow:0 2px 8px rgba(0,0,0,.4);pointer-events:none;}
  .vbar:focus-visible{outline:3px solid #fff;outline-offset:3px;}

  /* RESULT */
  #screen-result{flex-direction:column;}
  .band{flex:1;position:relative;}
  #resScore{position:absolute;top:6%;right:7%;text-align:right;z-index:3;}
  #resScore .big-num{display:block;}
  #resComment{font-size:15px;font-weight:700;margin-top:6px;max-width:18ch;margin-left:auto;line-height:1.4;transition:opacity .25s ease;}
  .vlabel{position:absolute;left:7%;z-index:3;}
  .vlabel .k{font-size:12px;font-weight:600;opacity:.6;}
  .vlabel .val{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:3px;letter-spacing:.01em;}
  #lblYours{top:calc(50% - 64px);}   /* 위 band 안쪽 하단 */
  #lblOrig{bottom:8%;}               /* 아래 band 하단 (좌측, 버튼과 분리) */
  #descBlock{position:absolute;left:7%;right:7%;top:calc(50% + 22px);z-index:3;}
  #descBlock .dname{font-size:15px;font-weight:800;letter-spacing:-.01em;}
  #descBlock .dhex{font-weight:700;opacity:.5;font-variant-numeric:tabular-nums;}
  #descBlock .dtext{margin-top:6px;font-size:13.5px;line-height:1.55;font-weight:500;opacity:.9;}

  /* FINAL */
  #screen-final{justify-content:flex-start;background:#000;}
  .final-total{display:flex;align-items:flex-end;gap:2px;}
  .final-total .num{font-size:clamp(56px,16vw,84px);font-weight:800;line-height:.9;letter-spacing:-.03em;font-variant-numeric:tabular-nums;}
  .final-total .den{font-size:clamp(30px,9vw,44px);font-weight:800;color:var(--faint);letter-spacing:-.02em;}
  .final-comment{margin-top:14px;color:var(--muted);font-size:15px;line-height:1.5;max-width:26ch;transition:opacity .25s ease;}
  .breakdown{display:flex;gap:0;margin-top:auto;border-radius:10px;overflow:hidden;}
  .mini{position:relative;flex:1;aspect-ratio:1/1.05;display:flex;align-items:flex-start;justify-content:flex-start;}
  .mini .mscore{position:relative;z-index:2;font-size:13px;font-weight:700;padding:6px 7px;font-variant-numeric:tabular-nums;}
  .final-btns{display:flex;gap:12px;margin-top:24px;}
  .final-btns .btn{flex:1;}
  .final-note{margin-top:18px;color:var(--muted);font-size:13.5px;line-height:1.6;}

  /* LEADERBOARD */
  #screen-leaderboard{justify-content:flex-start;}
  .lb-head{font-size:34px;font-weight:800;letter-spacing:-.02em;}
  .lb-sub{font-size:13px;color:var(--muted);margin-top:2px;margin-bottom:14px;}
  .lb{list-style:none;overflow-y:auto;flex:1;margin:0 -4px;}
  .lb li{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--hair);font-size:15px;}
  .lb li:last-child{border-bottom:none;}
  .lb .rank{width:24px;font-weight:800;color:var(--faint);font-variant-numeric:tabular-nums;text-align:center;}
  .lb .rank.medal{color:var(--accent-2);}
  .lb .who{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lb .pts{font-weight:800;color:var(--accent-2);font-variant-numeric:tabular-nums;}
  .lb li.me{background:rgba(94,26,255,.16);border-radius:10px;border-bottom-color:transparent;padding-left:8px;padding-right:8px;}
  .lb-empty{color:var(--muted);font-size:14px;text-align:center;padding:24px 0;}
  .lb-btns{display:flex;gap:12px;margin-top:16px;}
  .lb-btns .btn{flex:1;}

  .fade{animation:fade .35s ease both;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}
</style>
</head>
<body>
<div class="stage" id="stage">

  <!-- START -->
  <section id="screen-start" class="screen pad fade">
    <div class="eyebrow">Evom Design System</div>
    <h1 class="huge" style="margin-top:10px;font-size:clamp(44px,13vw,72px);">Color Game</h1>
    <p class="desc">색을 잠깐 보여드려요. 사라진 뒤 슬라이더로 같은 색을 다시 만들어 보세요. 총 5라운드입니다.</p>
    <div class="start-foot">
      <input id="nick" type="text" maxlength="16" placeholder="이름을 입력하세요" autocomplete="off">
      <button id="startBtn" class="btn btn-primary" disabled>시작하기</button>
    </div>
    <button id="viewLbBtn" class="btn-text" style="margin-top:12px;align-self:center;">리더보드 보기</button>
  </section>

  <!-- COUNT-IN -->
  <section id="screen-countin" class="screen hidden">
    <div class="rtag" id="tag-countin">1 / 5</div>
    <div id="countinWord"><span class="huge" id="countinText">준비</span></div>
  </section>

  <!-- REVEAL -->
  <section id="screen-reveal" class="screen hidden">
    <div class="rtag" id="tag-reveal">1 / 5</div>
    <div id="revealNum">
      <span class="big-num" id="countNum">5</span>
      <span class="sub">초 남음</span>
    </div>
  </section>

  <!-- GUESS -->
  <section id="screen-guess" class="screen hidden">
    <div class="rtag" id="tag-guess">1 / 5</div>
    <div class="rail">
      <div class="vbar" id="barH" role="slider" aria-label="색상" aria-valuemin="0" aria-valuemax="360"><div class="vhandle" id="hH"></div></div>
      <div class="vbar" id="barS" role="slider" aria-label="채도" aria-valuemin="0" aria-valuemax="100"><div class="vhandle" id="hS"></div></div>
      <div class="vbar" id="barV" role="slider" aria-label="밝기" aria-valuemin="0" aria-valuemax="100"><div class="vhandle" id="hV"></div></div>
    </div>
    <button id="submitBtn" class="fab" aria-label="이 색으로 확정">
      <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"></polyline></svg>
    </button>
  </section>

  <!-- RESULT -->
  <section id="screen-result" class="screen hidden">
    <div class="band" id="bandTop"></div>
    <div class="band" id="bandBot"></div>
    <div class="rtag" id="tag-result">1 / 5</div>
    <div id="resScore">
      <span class="big-num" id="roundScore">0.00</span>
      <span id="resComment"></span>
    </div>
    <div class="vlabel" id="lblYours"><div class="k">Your selection</div><div class="val" id="hsbGuess"></div></div>
    <div class="vlabel" id="lblOrig"><div class="k">Original</div><div class="val" id="hsbTarget"></div></div>
    <div id="descBlock">
      <div class="dname"><span id="descName"></span> <span class="dhex" id="descHex"></span></div>
      <p class="dtext" id="descText"></p>
    </div>
    <button id="nextBtn" class="fab" aria-label="계속하기">
      <svg viewBox="0 0 24 24"><line x1="4" y1="12" x2="19" y2="12"></line><polyline points="13 6 19 12 13 18"></polyline></svg>
    </button>
  </section>

  <!-- FINAL -->
  <section id="screen-final" class="screen pad hidden">
    <div class="final-total"><span class="num" id="totalNum">0.00</span><span class="den">/50</span></div>
    <p class="final-comment" id="finalComment"></p>
    <div class="breakdown" id="breakdown"></div>
    <p class="final-note">에봄에서 자주 사용되는 색상을 소개해드렸는데 어떠셨나요?<br>앞으로도 계속 업데이트 될 디자인 시스템을 기대해 주세요 🏃‍♀️</p>
    <div class="final-btns">
      <button id="againBtn" class="btn btn-primary">다시 도전</button>
      <button id="finalLbBtn" class="btn btn-outline">리더보드 보기</button>
    </div>
  </section>

  <!-- LEADERBOARD -->
  <section id="screen-leaderboard" class="screen pad hidden">
    <div class="lb-head">리더보드</div>
    <div class="lb-sub">최고 점수</div>
    <ol class="lb" id="leaderboard"></ol>
    <div class="lb-btns">
      <button id="lbStartBtn" class="btn btn-primary">게임 시작하기</button>
      <button id="lbBackBtn" class="btn btn-outline">처음으로</button>
    </div>
  </section>

</div>

<script>
// ---------- color tokens ----------
const TOKENS = {
  evomcobalt7:{hex:'#5E1AFF',name:'Evom Cobalt 7',desc:'브랜드 프라이머리 — 에봄 브랜드 보라색이에요. 에봄 로고의 메인 색상이며, 주요 액션과 강조에 쓰는 색이에요.'},
  evomcobalt5:{hex:'#7566FF',name:'Evom Cobalt 5',desc:'브랜드 서브 — 에봄 브랜드 보라색의 밝은 버전으로, 보조 강조와 발표자료에 쓰여요.'},
  evomcobalt0:{hex:'#F0F0FE',name:'Evom Cobalt 0',desc:'브랜드 틴트 — 에봄 브랜드 보라색의 가장 밝은 버전으로, 배경에 쓰이는 연한 보라색이에요.'},
  indigo7:{hex:'#4263EB',name:'Indigo 7',desc:'시맨틱 인디고 — 정보와 인터랙션을 나타내는 선명한 남색이에요.'},
  gray0:{hex:'#F8F9FA',name:'Gray 0',desc:'캔버스 그레이 — 거의 흰색에 가까운 기본 배경이에요.'},
  gray9:{hex:'#212529',name:'Gray 9',desc:'잉크 그레이 — 거의 검은색에 가까운 진한 회색으로, 텍스트와 주요 요소에 쓰여요.'},
  red6:{hex:'#FA5252',name:'Red 6',desc:'시맨틱 레드 — 오류와 경고를 나타내는 선명한 빨간색이에요.'},
  teal6:{hex:'#12B886',name:'Teal 6',desc:'시맨틱 틸 — 성공과 승인을 나타내는 선명한 청록색이에요.'},
};
const FIRST='evomcobalt7';
const POOL=['evomcobalt5','evomcobalt0','indigo7','gray0','gray9','red6','teal6'];
const EXCLUSIVE=[['evomcobalt0','gray0']];
const LB_API='/api/leaderboard';

// ---------- color math ----------
function hexToRgb(h){const n=parseInt(h.slice(1),16);return{r:(n>>16)&255,g:(n>>8)&255,b:n&255};}
function hsvToRgb(h,s,v){
  s/=100;v/=100;
  const c=v*s, hh=((h%360)+360)%360/60, x=c*(1-Math.abs(hh%2-1));
  let r=0,g=0,b=0;
  if(hh<1){r=c;g=x;}else if(hh<2){r=x;g=c;}else if(hh<3){g=c;b=x;}
  else if(hh<4){g=x;b=c;}else if(hh<5){r=x;b=c;}else{r=c;b=x;}
  const m=v-c;
  return{r:Math.round((r+m)*255),g:Math.round((g+m)*255),b:Math.round((b+m)*255)};
}
function rgbToHsv({r,g,b}){
  r/=255;g/=255;b/=255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
  let h=0;
  if(d!==0){
    if(mx===r)h=((g-b)/d)%6;else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;
    h*=60;if(h<0)h+=360;
  }
  return{h:Math.round(h),s:Math.round((mx===0?0:d/mx)*100),v:Math.round(mx*100)};
}
function rgbToXyz({r,g,b}){
  let R=r/255,G=g/255,B=b/255;
  const lin=c=>c>0.04045?Math.pow((c+0.055)/1.055,2.4):c/12.92;
  R=lin(R);G=lin(G);B=lin(B);
  return{x:(R*0.4124+G*0.3576+B*0.1805)*100,y:(R*0.2126+G*0.7152+B*0.0722)*100,z:(R*0.0193+G*0.1192+B*0.9505)*100};
}
function xyzToLab({x,y,z}){
  const Xn=95.047,Yn=100,Zn=108.883;
  const f=t=>t>0.008856?Math.cbrt(t):(7.787*t+16/116);
  const fx=f(x/Xn),fy=f(y/Yn),fz=f(z/Zn);
  return{L:116*fy-16,a:500*(fx-fy),b:200*(fy-fz)};
}
function labOf(rgb){return xyzToLab(rgbToXyz(rgb));}
function deltaE2000(l1,l2){
  const{L:L1,a:a1,b:b1}=l1,{L:L2,a:a2,b:b2}=l2;
  const avgL=(L1+L2)/2;
  const C1=Math.sqrt(a1*a1+b1*b1),C2=Math.sqrt(a2*a2+b2*b2);
  const avgC=(C1+C2)/2;
  const G=0.5*(1-Math.sqrt(Math.pow(avgC,7)/(Math.pow(avgC,7)+Math.pow(25,7))));
  const a1p=a1*(1+G),a2p=a2*(1+G);
  const C1p=Math.sqrt(a1p*a1p+b1*b1),C2p=Math.sqrt(a2p*a2p+b2*b2);
  const avgCp=(C1p+C2p)/2;
  const h=(x,y)=>{let hp=Math.atan2(y,x)*180/Math.PI;return hp<0?hp+360:hp;};
  const h1p=h(a1p,b1),h2p=h(a2p,b2);
  let dhp;
  if(C1p*C2p===0)dhp=0;
  else if(Math.abs(h2p-h1p)<=180)dhp=h2p-h1p;
  else if(h2p-h1p>180)dhp=h2p-h1p-360;
  else dhp=h2p-h1p+360;
  const dLp=L2-L1,dCp=C2p-C1p;
  const dHp=2*Math.sqrt(C1p*C2p)*Math.sin((dhp*Math.PI/180)/2);
  let avgHp;
  if(C1p*C2p===0)avgHp=h1p+h2p;
  else if(Math.abs(h1p-h2p)<=180)avgHp=(h1p+h2p)/2;
  else if(h1p+h2p<360)avgHp=(h1p+h2p+360)/2;
  else avgHp=(h1p+h2p-360)/2;
  const T=1-0.17*Math.cos((avgHp-30)*Math.PI/180)+0.24*Math.cos((2*avgHp)*Math.PI/180)
          +0.32*Math.cos((3*avgHp+6)*Math.PI/180)-0.20*Math.cos((4*avgHp-63)*Math.PI/180);
  const dTheta=30*Math.exp(-Math.pow((avgHp-275)/25,2));
  const Rc=2*Math.sqrt(Math.pow(avgCp,7)/(Math.pow(avgCp,7)+Math.pow(25,7)));
  const Sl=1+(0.015*Math.pow(avgL-50,2))/Math.sqrt(20+Math.pow(avgL-50,2));
  const Sc=1+0.045*avgCp;
  const Sh=1+0.015*avgCp*T;
  const Rt=-Math.sin((2*dTheta)*Math.PI/180)*Rc;
  return Math.sqrt(Math.pow(dLp/Sl,2)+Math.pow(dCp/Sc,2)+Math.pow(dHp/Sh,2)+Rt*(dCp/Sc)*(dHp/Sh));
}
// ΔE(CIEDE2000) → 0–10 로지스틱 S-curve. 소수 2자리.
function scoreFromDE(de){
  const mid=13,width=4.5;
  const s=10/(1+Math.exp((de-mid)/width));
  return Math.max(0,Math.min(10,Math.round(s*100)/100));
}
function bandFor(s){
  if(s>=9.0)return'거의 완벽해요';
  if(s>=7.0)return'훌륭해요';
  if(s>=5.0)return'꽤 비슷해요';
  if(s>=3.0)return'조금 빗나갔어요';
  return'다음엔 더 가까이';
}
function fmt2(n){return (Math.round(n*100)/100).toFixed(2);}
// 0.00 → target 카운트업 (easeOutQuad). 끝나면 onDone 호출.
function countUp(el,target,dur,onDone){
  const reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduce){el.textContent=fmt2(target);if(onDone)onDone();return;}
  const start=performance.now();
  (function tick(now){
    const t=Math.min(1,(now-start)/dur);
    const e=1-Math.pow(1-t,2);
    el.textContent=fmt2(target*e);
    if(t<1)requestAnimationFrame(tick);
    else{el.textContent=fmt2(target);if(onDone)onDone();}
  })(start);
}
function isLight(rgb){return (0.2126*rgb.r+0.7152*rgb.g+0.0722*rgb.b)/255 > 0.6;}
function rgbCss(c){return `rgb(${c.r},${c.g},${c.b})`;}

// ---------- state ----------
const $=id=>document.getElementById(id);
let nickname='';
let sequence=[];
let round=0;
let rounds=[];       // {key, guessRgb, score}
let lastSubmit=null; // {name, score}
let timer=null;
const sel={h:210,s:35,v:62}; // current guess in HSB

const SCREENS=['screen-start','screen-countin','screen-reveal','screen-guess','screen-result','screen-final','screen-leaderboard'];
function show(id){SCREENS.forEach(s=>$(s).classList.add('hidden'));const el=$(id);el.classList.remove('hidden');el.classList.remove('fade');void el.offsetWidth;el.classList.add('fade');}
function setTag(v){['tag-countin','tag-reveal','tag-guess','tag-result'].forEach(id=>{const e=$(id);if(e)e.textContent=`${round+1} / 5`;});}

function buildSequence(){
  let pool=[...POOL];
  EXCLUSIVE.forEach(pair=>{
    if(pair.every(k=>pool.includes(k))){
      const drop=pair[Math.floor(Math.random()*pair.length)];
      pool=pool.filter(k=>k!==drop);
    }
  });
  return [FIRST, ...pool.sort(()=>Math.random()-0.5).slice(0,4)];
}

// ---------- start ----------
$('nick').addEventListener('input',e=>{nickname=e.target.value.trim();$('startBtn').disabled=nickname.length===0;});
$('nick').addEventListener('keydown',e=>{if(e.key==='Enter'&&nickname)$('startBtn').click();});
$('startBtn').addEventListener('click',startGame);
$('viewLbBtn').addEventListener('click',()=>showLeaderboardView(null));

function startGame(){
  sequence=buildSequence();round=0;rounds=[];lastSubmit=null;
  countIn();
}

// ---------- count-in (준비 → 시작) ----------
function countIn(){
  setTag();
  const w=$('countinText');
  w.textContent='준비';w.style.opacity='0';w.style.transform='translateY(8px)';
  show('screen-countin');
  requestAnimationFrame(()=>{w.style.opacity='1';w.style.transform='none';});
  setTimeout(()=>{
    w.style.opacity='0';w.style.transform='translateY(-8px)';
    setTimeout(()=>{
      w.textContent='시작';w.style.transform='translateY(8px)';
      requestAnimationFrame(()=>{w.style.opacity='1';w.style.transform='none';});
    },180);
  },820);
  setTimeout(beginReveal,1700);
}

// ---------- reveal ----------
function beginReveal(){
  setTag();
  const hex=TOKENS[sequence[round]].hex;
  $('screen-reveal').style.background=hex;
  const dark=!isLight(hexToRgb(hex));
  const col=dark?'#fff':'#0b0b0d';
  $('countNum').style.color=col;$('countNum').nextElementSibling.style.color=col;
  $('tag-reveal').style.color=col;
  show('screen-reveal');
  const start=performance.now();
  $('countNum').textContent='5';
  clearInterval(timer);
  timer=setInterval(()=>{
    const left=Math.max(0,5-(performance.now()-start)/1000);
    $('countNum').textContent=Math.ceil(left);
    if(left<=0){clearInterval(timer);beginGuess();}
  },90);
}

// ---------- guess (vertical HSB sliders) ----------
function paint(){
  const rgb=hsvToRgb(sel.h,sel.s,sel.v);
  $('screen-guess').style.background=rgbCss(rgb);
  // overlays adapt to current color
  const col=isLight(rgb)?'#0b0b0d':'#fff';
  $('tag-guess').style.color=col;
  // gradients
  const sHi=hsvToRgb(sel.h,100,sel.v), sLo=hsvToRgb(sel.h,0,sel.v), vHi=hsvToRgb(sel.h,sel.s,100);
  $('barH').style.background='linear-gradient(to bottom,hsl(0 100% 50%),hsl(60 100% 50%),hsl(120 100% 50%),hsl(180 100% 50%),hsl(240 100% 50%),hsl(300 100% 50%),hsl(360 100% 50%))';
  $('barS').style.background=`linear-gradient(to bottom,${rgbCss(sHi)},${rgbCss(sLo)})`;
  $('barV').style.background=`linear-gradient(to bottom,${rgbCss(vHi)},#000)`;
  // handle positions (top = max for S/V; top = hue 0)
  $('hH').style.top=(sel.h/360*100)+'%';
  $('hS').style.top=((100-sel.s)/100*100)+'%';
  $('hV').style.top=((100-sel.v)/100*100)+'%';
  $('barH').setAttribute('aria-valuenow',sel.h);
  $('barS').setAttribute('aria-valuenow',sel.s);
  $('barV').setAttribute('aria-valuenow',sel.v);
}
function bindBar(barId,kind){
  const bar=$(barId);
  let drag=false;
  const apply=clientY=>{
    const r=bar.getBoundingClientRect();
    let p=(clientY-r.top)/r.height;p=Math.max(0,Math.min(1,p));
    if(kind==='h')sel.h=Math.round(p*360);
    else if(kind==='s')sel.s=Math.round((1-p)*100);
    else sel.v=Math.round((1-p)*100);
    paint();
  };
  bar.addEventListener('pointerdown',e=>{drag=true;bar.setPointerCapture(e.pointerId);apply(e.clientY);});
  bar.addEventListener('pointermove',e=>{if(drag)apply(e.clientY);});
  bar.addEventListener('pointerup',()=>{drag=false;});
  bar.addEventListener('pointercancel',()=>{drag=false;});
  bar.addEventListener('keydown',e=>{
    const step=e.shiftKey?10:1;let done=true;
    if(e.key==='ArrowUp'){if(kind==='h')sel.h=(sel.h-step+360)%360;else if(kind==='s')sel.s=Math.min(100,sel.s+step);else sel.v=Math.min(100,sel.v+step);}
    else if(e.key==='ArrowDown'){if(kind==='h')sel.h=(sel.h+step)%360;else if(kind==='s')sel.s=Math.max(0,sel.s-step);else sel.v=Math.max(0,sel.v-step);}
    else done=false;
    if(done){e.preventDefault();paint();}
  });
}
bindBar('barH','h');bindBar('barS','s');bindBar('barV','v');

function beginGuess(){
  setTag();
  sel.h=210;sel.s=35;sel.v=62;
  paint();
  show('screen-guess');
}
$('submitBtn').addEventListener('click',submitGuess);

// ---------- result ----------
function submitGuess(){
  const key=sequence[round];
  const tHex=TOKENS[key].hex, tRgb=hexToRgb(tHex);
  const gRgb=hsvToRgb(sel.h,sel.s,sel.v);
  const de=deltaE2000(labOf(tRgb),labOf(gRgb));
  const sc=scoreFromDE(de);
  rounds.push({key,guessRgb:gRgb,score:sc});

  setTag();
  $('bandTop').style.background=rgbCss(gRgb);   // your selection
  $('bandBot').style.background=tHex;           // original
  const gCol=isLight(gRgb)?'#0b0b0d':'#fff';
  const tCol=isLight(tRgb)?'#0b0b0d':'#fff';
  $('tag-result').style.color=gCol;
  $('resScore').style.color=gCol;
  $('lblYours').style.color=gCol;
  $('lblOrig').style.color=tCol;
  $('roundScore').textContent='0.00';
  $('resComment').textContent=bandFor(sc);
  $('resComment').style.opacity='0';
  countUp($('roundScore'),sc,1000,()=>{$('resComment').style.opacity='1';});
  const tHsb=rgbToHsv(tRgb);
  $('hsbGuess').textContent=`H${sel.h} S${sel.s} B${sel.v}`;
  $('hsbTarget').textContent=`H${tHsb.h} S${tHsb.s} B${tHsb.v}`;
  $('descName').textContent=TOKENS[key].name;
  $('descHex').textContent=tHex.toUpperCase();
  $('descText').textContent=TOKENS[key].desc;
  $('descBlock').style.color=tCol;
  $('nextBtn').setAttribute('aria-label',round>=4?'결과 보기':'계속하기');
  show('screen-result');
}
$('nextBtn').addEventListener('click',()=>{
  round++;
  if(round>=5)finish();
  else countIn();
});

// ---------- final ----------
async function finish(){
  const total=Math.round(rounds.reduce((a,r)=>a+r.score,0)*100)/100;
  $('totalNum').textContent='0.00';
  $('finalComment').textContent=bandFor(total/5);
  $('finalComment').style.opacity='0';
  const bd=$('breakdown');bd.innerHTML='';
  rounds.forEach(r=>{
    const tHex=TOKENS[r.key].hex;
    const cell=document.createElement('div');cell.className='mini';
    cell.style.background=`linear-gradient(135deg, ${rgbCss(r.guessRgb)} 0 49.6%, ${tHex} 50% 100%)`;
    const sc=document.createElement('span');sc.className='mscore';
    sc.textContent=fmt2(r.score);
    sc.style.color=isLight(r.guessRgb)?'#0b0b0d':'#fff';
    cell.appendChild(sc);bd.appendChild(cell);
  });
  show('screen-final');
  countUp($('totalNum'),total,1000,()=>{$('finalComment').style.opacity='1';});
  lastSubmit={name:nickname,score:total};
  // 점수 기록(POST). 리스트는 '리더보드 보기'에서 표시.
  try{await fetchBoard(lastSubmit);}catch(e){}
}
$('againBtn').addEventListener('click',startGame);
$('finalLbBtn').addEventListener('click',()=>showLeaderboardView(lastSubmit));

// ---------- leaderboard ----------
async function fetchBoard(payload){
  async function call(opt){
    const res=await fetch(LB_API,opt);
    let data=null;try{data=await res.json();}catch(e){}
    if(res.ok&&data&&Array.isArray(data.board))return {board:data.board};
    return {error:(data&&data.error)?data.error:`서버 오류 (HTTP ${res.status})`};
  }
  try{
    const opt=payload?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}:undefined;
    const r=await call(opt);
    if(r.board)return r;
    if(payload){try{const r2=await call(undefined);if(r2.board)return r2;}catch(e){}}
    return r;
  }catch(e){return {error:'네트워크에 연결할 수 없어요. 잠시 후 다시 시도해주세요.'};}
}
async function showLeaderboardView(mine){
  const ol=$('leaderboard');
  ol.innerHTML='<li class="lb-empty">리더보드를 불러오는 중…</li>';
  show('screen-leaderboard');
  const r=await fetchBoard();
  if(r.error){ol.innerHTML=`<li class="lb-empty">리더보드를 불러올 수 없어요 — ${escapeHtml(r.error)}</li>`;return;}
  renderLeaderboard(r.board,mine);
}
function renderLeaderboard(board,mine){
  const ol=$('leaderboard');ol.innerHTML='';
  if(!board.length){ol.innerHTML='<li class="lb-empty">아직 기록이 없어요. 첫 주자가 되어보세요.</li>';return;}
  let marked=false;
  board.slice(0,10).forEach((row,i)=>{
    const isMe=!marked&&mine&&row.name===mine.name&&Number(row.score)===Number(mine.score);
    if(isMe)marked=true;
    const li=document.createElement('li');if(isMe)li.className='me';
    const medal=i<3?' medal':'';
    li.innerHTML=`<span class="rank${medal}">${i+1}</span><span class="who">${escapeHtml(row.name)}</span><span class="pts">${fmt2(row.score)}</span>`;
    ol.appendChild(li);
  });
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
$('lbBackBtn').addEventListener('click',()=>show('screen-start'));
$('lbStartBtn').addEventListener('click',()=>{if(nickname)startGame();else{show('screen-start');$('nick').focus();}});
</script>
